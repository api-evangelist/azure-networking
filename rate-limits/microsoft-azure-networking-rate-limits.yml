    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Azure Virtual Networks API
      - Azure Load Balancer API
      - Azure Application Gateway API
      - Azure Network Security Groups API
