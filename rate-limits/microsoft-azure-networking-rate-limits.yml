specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Networking
providerId: microsoft-azure-networking
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Azure
  - Cloud
  - Infrastructure
  - Microsoft
  - Networking
  - Rate Limiting
description: Azure Networking management API calls go through Azure Resource Manager (ARM)
  and the Microsoft.Network resource provider. ARM applies a token-bucket throttling model
  per region, per subscription, per service principal, per operation type. The Microsoft.Network
  resource provider applies an additional per-subscription per-region cap (writes/deletes
  1,000 per 5 minutes; reads 10,000 per 5 minutes). Throttled requests return HTTP 429 with
  a Retry-After header. Limits can be raised by support request.
sources:
  - https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/request-limits-and-throttling
  - https://learn.microsoft.com/en-us/azure/networking/
headers:
  retryAfter: Retry-After
  remainingSubscriptionReads: x-ms-ratelimit-remaining-subscription-reads
  remainingSubscriptionWrites: x-ms-ratelimit-remaining-subscription-writes
  remainingSubscriptionDeletes: x-ms-ratelimit-remaining-subscription-deletes
  remainingTenantReads: x-ms-ratelimit-remaining-tenant-reads
  remainingTenantWrites: x-ms-ratelimit-remaining-tenant-writes
  remainingResource: x-ms-ratelimit-remaining-resource
responseCodes:
  throttled: 429
  retryableErrorDueToAnotherOperation: 429
  serviceUnavailable: 503
limits:
  - name: ARM subscription reads (token bucket)
    scope: subscription/region/serviceprincipal
    metric: requests_per_second
    limit: 25
    timeFrame: second
    notes: Bucket size 250 tokens; refill rate 25 tokens/sec. Global subscription cap is 15× per
      operation type across all service principals.
  - name: ARM subscription writes (token bucket)
    scope: subscription/region/serviceprincipal
    metric: requests_per_second
    limit: 10
    timeFrame: second
    notes: Bucket size 200 tokens; refill rate 10 tokens/sec.
  - name: ARM subscription deletes (token bucket)
    scope: subscription/region/serviceprincipal
    metric: requests_per_second
    limit: 10
    timeFrame: second
    notes: Bucket size 200 tokens; refill rate 10 tokens/sec.
  - name: ARM tenant reads
    scope: tenant
    metric: requests_per_second
    limit: 25
    timeFrame: second
    notes: Bucket size 250; refill 25/sec.
  - name: Microsoft.Network resource provider — write/delete (PUT)
    scope: subscription/region
    metric: requests_per_5_minutes
    limit: 1000
    timeFrame: minute
    notes: Per-subscription per-region cap on Microsoft.Network PUT/DELETE.
  - name: Microsoft.Network resource provider — read (GET)
    scope: subscription/region
    metric: requests_per_5_minutes
    limit: 10000
    timeFrame: minute
    notes: Per-subscription per-region cap on Microsoft.Network GET.
  - name: Azure DNS query plane
    scope: hosted-zone
    metric: queries_per_second
    limit: see vendor docs
    notes: Authoritative resolvers handle very high QPS via anycast; query-plane is not subject
      to ARM throttling.
policies:
  - name: Token bucket algorithm
    description: ARM uses a regional token bucket. Each request consumes a token; tokens refill
      at the documented rate. When the bucket is empty, requests return 429 with Retry-After.
  - name: Exponential backoff with Retry-After
    description: Clients must honor the Retry-After response header. Azure SDKs implement
      automatic backoff; custom clients should use exponential backoff with jitter.
  - name: Multi-instance global cap
    description: The global subscription-wide cap is 15× the per-service-principal limit per
      operation type to prevent any single principal from saturating the subscription.
  - name: getBatch for metrics
    description: Heavy use of the */providers/microsoft.insights/metrics API is a common cause
      of throttling. Microsoft recommends switching to the metrics:getBatch API to query
      multiple resources per request.
  - name: Limit increase via support
    description: Resource-provider-specific limits can be raised by opening an Azure support
      ticket; the ARM-level token bucket is generally fixed.
  - name: RetryableErrorDueToAnotherOperation
    description: Microsoft.Network may return 429 with code RetryableErrorDueToAnotherOperation
      when the target resource is locked by a concurrent operation; retry with backoff.
maintainers:
