specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Networking
providerId: microsoft-azure-networking
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Azure
  - Cloud
  - Infrastructure
  - Microsoft
  - Networking
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Azure Networking API surface. Captures per-tier
  quotas, burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to
  be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Azure Virtual Networks API
      - Azure Load Balancer API
      - Azure Application Gateway API
      - Azure Network Security Groups API
      - Azure VPN Gateway API
      - Azure Traffic Manager API
      - Azure ExpressRoute API
      - Azure Firewall API
      - Azure DNS API
      - Azure Private DNS API
      - Azure Front Door API
      - Azure DDoS Protection API
      - Azure Network Watcher API
      - Azure Bastion API
      - Azure NAT Gateway API
      - Azure Private Link API
      - Azure Virtual WAN API
      - Azure Web Application Firewall API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - Azure Virtual Networks API
      - Azure Load Balancer API
      - Azure Application Gateway API
      - Azure Network Security Groups API
      - Azure VPN Gateway API
      - Azure Traffic Manager API
      - Azure ExpressRoute API
      - Azure Firewall API
      - Azure DNS API
      - Azure Private DNS API
      - Azure Front Door API
      - Azure DDoS Protection API
      - Azure Network Watcher API
      - Azure Bastion API
      - Azure NAT Gateway API
      - Azure Private Link API
      - Azure Virtual WAN API
      - Azure Web Application Firewall API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Azure Virtual Networks API
      - Azure Load Balancer API
      - Azure Application Gateway API
      - Azure Network Security Groups API
      - Azure VPN Gateway API
      - Azure Traffic Manager API
      - Azure ExpressRoute API
      - Azure Firewall API
      - Azure DNS API
      - Azure Private DNS API
      - Azure Front Door API
      - Azure DDoS Protection API
      - Azure Network Watcher API
      - Azure Bastion API
      - Azure NAT Gateway API
      - Azure Private Link API
      - Azure Virtual WAN API
      - Azure Web Application Firewall API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - Azure Virtual Networks API
      - Azure Load Balancer API
      - Azure Application Gateway API
      - Azure Network Security Groups API
      - Azure VPN Gateway API
      - Azure Traffic Manager API
      - Azure ExpressRoute API
      - Azure Firewall API
      - Azure DNS API
      - Azure Private DNS API
      - Azure Front Door API
