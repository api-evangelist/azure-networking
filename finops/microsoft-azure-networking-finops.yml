description: FOCUS-aligned FinOps for Azure Networking — pay-as-you-go per resource family
  (Virtual Network, Load Balancer, VPN Gateway, ExpressRoute, Front Door, Firewall, DNS) plus
  metered outbound data transfer. Reserved Instances, Savings Plans, and Azure consumption
  commitments (MACC) are the primary cost-optimization levers; Cost Management + Billing,
  Azure Advisor, and the FOCUS-conformant Cost Management exports provide visibility.
sources:
  - https://azure.microsoft.com/en-us/pricing/details/virtual-network/
  - https://learn.microsoft.com/en-us/azure/cost-management-billing/
  - https://learn.microsoft.com/en-us/azure/cost-management-billing/costs/quick-create-budget
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD (settlement currency varies by region)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Azure Networking
  ServiceCategory: Networking
  ProviderName: Microsoft Azure
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  PricingCategory: Usage-Based
  PricingUnit: varies (hour, GB, request, zone-month)
  BillingCurrency: USD
  ChargeCategory: Usage
  RegionId: varies (eastus, westeurope, etc.)
meters:
  - name: gateway_hours
    description: Hourly running cost of a deployed gateway resource (VPN Gateway, Application
      Gateway, ExpressRoute Gateway, NAT Gateway, Bastion).
    unit: hour
    aggregation: sum
    dimensions:
      - resource_type
      - sku
      - region
  - name: data_processed
    description: Inbound + outbound data passing through a managed networking resource (Load
      Balancer, App Gateway, Firewall, NAT Gateway).
    unit: GB
    aggregation: sum
    dimensions:
      - resource_type
      - region
  - name: data_egress_internet
    description: Outbound data transfer from Azure to the public internet, charged in tiered
      bands by source region zone.
    unit: GB
    aggregation: sum
    dimensions:
      - source_region
      - destination_zone
      - tier_band
  - name: vnet_peering
    description: VNet peering ingress + egress, in-region or cross-region.
    unit: GB
    aggregation: sum
    dimensions:
      - peering_type
      - region_pair
  - name: dns_queries
    description: Resolution requests against Azure DNS hosted zones.
    unit: query
    aggregation: sum
    dimensions:
      - zone
      - record_type
  - name: dns_zones
    description: Active DNS hosted zones billed per month.
    unit: zone-month
    aggregation: max
    dimensions:
      - zone_type
  - name: rule_count
    description: Active load-balancing / WAF / firewall rules contributing to capacity charges.
    unit: rule-hour
    aggregation: sum
    dimensions:
      - resource_type
      - rule_type
principles:
  - name: Visibility
    description: Use Microsoft Cost Management + Billing, Azure Monitor, and the FOCUS-aligned
      Cost Management Exports v2 to ingest line-level cost data into your cost analytics platform.
      Network Watcher, NSG Flow Logs, and VNet flow logs reveal traffic patterns driving egress
      and peering charges.
  - name: Allocation
    description: Tag every networking resource with cost-center, environment, application,
      and owner. Use Azure Policy to enforce required tags. Management Groups + Subscriptions
      provide hierarchical chargeback boundaries; FOCUS columns SubAccountId / ResourceTags
      carry the tags through to billing exports.
  - name: Optimization
    description: Right-size gateway SKUs (VpnGw1 vs VpnGw5), purchase 1- or 3-year Reserved
      Capacity for ExpressRoute and Application Gateway, use Azure Front Door / Private Link
      to avoid public-internet egress, deploy NAT Gateway instead of Public IPs to minimize
      SNAT cost, and consolidate Standard Load Balancer rules. Azure Advisor surfaces idle
      gateways and underutilized firewalls.
  - name: Accountability
    description: Set Cost Management budgets with action-group alerts at 50/80/100% thresholds
      per subscription/resource group. Network architects own egress topology decisions; tag
      the workload owner so egress overage routes to the right team. Review monthly cost
      against unit economics (egress per active user, gateway-hour per region served).
